version: '3.8'

services:
  claude-local:
    build: .
    container_name: claude-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1:8b
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets container reach Ollama on your Mac
    volumes:
      - claude-data:/data
    networks:
      - claude-net

volumes:
  claude-data:
    driver: local

networks:
  claude-net:
    driver: bridge
